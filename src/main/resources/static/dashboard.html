<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrintDock - Dashboard</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f9f9ff 0%, #dfe8ff 100%);
      color: #061b39;
    }
    .page-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(26, 45, 84, 0.08);
      padding: 28px;
    }
    .btn {
      border-radius: 9999px;
      padding: 12px 24px;
      background: #004dbc;
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between mb-10">
      <div>
        <p class="text-sm uppercase tracking-[0.24em] text-slate-500">PrintDock</p>
        <h1 class="text-4xl font-bold text-slate-950 mt-3">Dashboard</h1>
      </div>
      <button class="btn" id="logoutBtn">Logout</button>
    </header>

    <main class="grid gap-6">
      <section class="card">
        <p class="text-slate-500">Selamat datang,</p>
        <h2 class="text-3xl font-semibold mt-3" id="welcomeText">User</h2>
        <p class="mt-4 text-slate-600 max-w-2xl">Ini adalah area dashboard sederhana. Anda sudah berhasil login, dan halaman ini akan menjadi pusat kontrol untuk PrintDock.</p>
      </section>

      <section class="grid gap-4 sm:grid-cols-2">
        <div class="card">
          <p class="text-slate-500 uppercase tracking-[0.18em] text-xs">Role</p>
          <p class="text-2xl font-semibold mt-3" id="roleText"></p>
        </div>
        <div class="card">
          <p class="text-slate-500 uppercase tracking-[0.18em] text-xs">Status</p>
          <p class="text-2xl font-semibold mt-3 text-green-700">Akses aktif</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const userData = JSON.parse(sessionStorage.getItem('user') || 'null');
    const welcomeText = document.getElementById('welcomeText');
    const roleText = document.getElementById('roleText');
    const logoutBtn = document.getElementById('logoutBtn');

    if (!userData) {
      window.location.href = '/';
    } else {
      welcomeText.textContent = userData.username || 'Pengguna';
      roleText.textContent = userData.role || 'N/A';
    }

    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem('user');
      window.location.href = '/';
    });
  </script>
</body>
</html>
